name: akwaaba_gigs
description: "Akwaaba Gigs - Connecting real people to real gigs in Ghana"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  url_launcher: ^6.2.6
  cached_network_image: ^3.3.1
  image_picker: ^1.1.1
  parse_server_sdk_flutter: ^10.7.0
  carousel_slider: ^5.0.0
  permission_handler: ^11.3.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#32281E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#32281E"
    theme_color: "#D97706"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
